<div class="ib-chart-card ib-chart-card-full">
  <h4 class="ib-chart-title" style="text-align: center;" data-lfr-editable-id="title" data-lfr-editable-type="text">Revenue by Segment</h4>
  <div class="ib-doughnut-container">
    <canvas id="segmentChart"></canvas>
  </div>
  <div class="ib-segment-legend">
    <div class="ib-legend-item">
      <div class="ib-legend-dot" style="background: #0040a1;"></div>
      <span class="ib-legend-label" data-lfr-editable-id="l1" data-lfr-editable-type="text">Enterprise</span>
      <span class="ib-legend-value" data-lfr-editable-id="v1" data-lfr-editable-type="text">45%</span>
    </div>
    <div class="ib-legend-item">
      <div class="ib-legend-dot" style="background: #0056d2;"></div>
      <span class="ib-legend-label" data-lfr-editable-id="l2" data-lfr-editable-type="text">Mid-Market</span>
      <span class="ib-legend-value" data-lfr-editable-id="v2" data-lfr-editable-type="text">30%</span>
    </div>
    <div class="ib-legend-item">
      <div class="ib-legend-dot" style="background: #d5e3fc;"></div>
      <span class="ib-legend-label" data-lfr-editable-id="l3" data-lfr-editable-type="text">SMB</span>
      <span class="ib-legend-value" data-lfr-editable-id="v3" data-lfr-editable-type="text">15%</span>
    </div>
    <div class="ib-legend-item">
      <div class="ib-legend-dot" style="background: #eceef0;"></div>
      <span class="ib-legend-label" data-lfr-editable-id="l4" data-lfr-editable-type="text">Startup</span>
      <span class="ib-legend-value" data-lfr-editable-id="v4" data-lfr-editable-type="text">10%</span>
    </div>
  </div>
</div>
